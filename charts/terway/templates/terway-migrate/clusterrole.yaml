{{- if .Values.terwayMigrate.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "terway.migrate.clusterRoleName" . }}
  labels:
    {{- include "terway.labels" . | nindent 4 }}
    app.kubernetes.io/component: terway-migrate
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
      - patch
      - update
  - apiGroups:
      - network.alibabacloud.com
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
      - patch
      - update
  - apiGroups:
      - network.alibabacloud.com
    resources:
      - networkinterfaces
    verbs:
      - get
      - list
      - watch
{{- end }}
